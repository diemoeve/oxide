title: Oxide RAT — Remote Shell Execution
id: 4102b3c4-8901-4123-5456-oxide001sh001
status: experimental
description: >
  Detects non-interactive /bin/sh -c invocations spawned by a non-shell parent process.
  The oxide implant executes shell commands via:
    Command::new("/bin/sh").arg("-c").arg(command_string)
  This produces a /bin/sh process with parent = oxide-implant binary.
author: diemoeve
date: 2026/04/10
references:
  - https://attack.mitre.org/techniques/T1059/004/
tags:
  - attack.execution
  - attack.t1059.004
logsource:
  product: linux
  category: process_creation
detection:
  selection:
    Image|endswith: '/bin/sh'
    CommandLine|contains: '-c'
  filter_legitimate:
    ParentImage|contains:
      - '/bin/'
      - '/usr/bin/'
      - '/usr/local/bin/'
      - 'sshd'
      - 'cron'
      - 'systemd'
  condition: selection and not filter_legitimate
falsepositives:
  - Any process that spawns /bin/sh -c; tune ParentImage filter for environment
level: low

---
title: Oxide RAT — File and Directory Discovery
id: 5213c4d5-9012-4234-6567-oxide001fl001
status: experimental
description: >
  Detects rapid directory listing by a non-browser, non-shell process.
  The oxide file_list command handler reads directory contents and returns them.
  Source: implant/src/commands/file_list.rs
author: diemoeve
date: 2026/04/10
references:
  - https://attack.mitre.org/techniques/T1083/
tags:
  - attack.discovery
  - attack.t1083
logsource:
  product: linux
  category: file_event
detection:
  selection:
    file.path|startswith:
      - '/home/'
      - '/root/'
      - '/etc/'
      - '/tmp/'
  filter_legitimate:
    process.name:
      - 'find'
      - 'ls'
      - 'bash'
      - 'zsh'
      - 'sh'
      - 'rsync'
      - 'backup'
  condition: selection and not filter_legitimate
falsepositives:
  - Many legitimate processes access these paths; correlate with C2 network connection
level: low

---
title: Oxide RAT — Data Exfiltration via C2 Channel
id: 6324d5e6-0123-4345-7678-oxide001fd001
status: experimental
description: >
  Detects large outbound data transfer over a persistent TLS connection
  consistent with oxide file_download handler exfiltrating files.
  The handler base64-encodes file content and sends it over the C2 channel.
  Source: implant/src/commands/file_download.rs
author: diemoeve
date: 2026/04/10
references:
  - https://attack.mitre.org/techniques/T1041/
tags:
  - attack.exfiltration
  - attack.t1041
logsource:
  product: linux
  category: network_connection
detection:
  selection:
    Initiated: 'true'
    DestinationPort|not:
      - 80
      - 443
  filter_legitimate:
    Image|contains:
      - '/usr/bin/curl'
      - '/usr/bin/wget'
      - '/usr/bin/ssh'
      - '/usr/bin/rsync'
  condition: selection and not filter_legitimate
falsepositives:
  - Any application using non-standard outbound ports; combine with large transfer size
level: low

