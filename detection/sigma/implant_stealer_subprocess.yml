title: Oxide RAT — Long-Lived Process Spawns Browser Credential Harvester
id: b2c3d4e5-2345-6789-abcd-oxide008st002
status: experimental
description: >
  Detects a non-browser process accessing browser credential databases
  (Chrome Login Data, Firefox logins.json). The oxide implant spawns
  oxide-stealer as a subprocess that reads these files.
  Source: implant/src/commands/steal.rs; oxide-stealer/src/browser/
author: diemoeve
date: 2026/04/10
references:
  - https://attack.mitre.org/techniques/T1555/003/
  - https://attack.mitre.org/techniques/T1059/004/
tags:
  - attack.credential_access
  - attack.t1555.003
  - attack.execution
  - attack.t1059.004
logsource:
  product: linux
  service: auditd
detection:
  access_browser_cred_db:
    event.original|contains:
      - 'Login Data'
      - 'cookies.sqlite'
      - 'logins.json'
      - 'key4.db'
    event.original|contains: 'syscall=openat'
  not_browser:
    event.original|not|contains:
      - 'comm="chrome"'
      - 'comm="chromium"'
      - 'comm="firefox"'
      - 'comm="brave"'
  condition: access_browser_cred_db and not_browser
falsepositives:
  - Backup tools accessing browser profile directories; tune by adding ParentImage filter
level: high
