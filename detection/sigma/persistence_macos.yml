title: Oxide RAT — macOS LaunchAgent Persistence
id: 2f8091a2-6789-4f01-3234-oxide001la001
status: experimental
description: >
  Detects creation of the oxide LaunchAgent plist at
  ~/Library/LaunchAgents/com.oxide.update.plist.
  Plist content: Label=com.oxide.update, RunAtLoad=true, KeepAlive=false.
  Installed via: launchctl bootstrap gui/<uid> <plist_path>
  NOTE: LaunchAgents only activate on GUI login, not bare system reboot.
  NOTE: macOS product value is "macos" (not the outdated "osx").
author: diemoeve
date: 2026/04/10
references:
  - https://attack.mitre.org/techniques/T1543/001/
tags:
  - attack.persistence
  - attack.t1543.001
logsource:
  product: macos
  category: file_event
detection:
  selection:
    file.path|contains: '/Library/LaunchAgents/com.oxide.update.plist'
  condition: selection
falsepositives:
  - None expected — highly specific plist name
level: high

