title: Oxide RAT — Process Discovery via /proc Enumeration
id: 8546f708-2345-4567-9890-oxide001pl001
status: experimental
description: >
  Detects high-frequency reads of /proc/<pid>/status and /proc/<pid>/cmdline
  from a non-system process, consistent with the oxide process_list handler.
  Source: implant/src/commands/process_list.rs
author: diemoeve
date: 2026/04/10
references:
  - https://attack.mitre.org/techniques/T1057/
tags:
  - attack.discovery
  - attack.t1057
logsource:
  product: linux
  service: auditd
detection:
  selection:
    event.original|contains:
      - '/proc/'
    event.original|contains|any:
      - '/status'
      - '/cmdline'
  filter_system:
    event.original|contains:
      - 'comm="ps"'
      - 'comm="top"'
      - 'comm="htop"'
      - 'comm="systemd"'
  condition: selection and not filter_system
falsepositives:
  - System monitoring tools, ps, top; tune via auditd comm field
level: low

---
title: Oxide RAT — System Information Discovery at Startup
id: 9657081a-3456-4678-0901-oxide001si001
status: experimental
description: >
  Detects reads of /etc/machine-id and /etc/hostname at process startup,
  consistent with the oxide check-in packet construction in checkin.rs.
  The implant reads these files to build HWID and hostname fields.
  Source: implant/src/platform/linux.rs, checkin.rs
author: diemoeve
date: 2026/04/10
references:
  - https://attack.mitre.org/techniques/T1082/
tags:
  - attack.discovery
  - attack.t1082
logsource:
  product: linux
  service: auditd
detection:
  selection:
    event.original|contains:
      - '/etc/machine-id'
  filter_system:
    event.original|contains:
      - 'comm="systemd"'
      - 'comm="dbus-daemon"'
      - 'comm="NetworkManager"'
  condition: selection and not filter_system
falsepositives:
  - Many legitimate processes read /etc/machine-id; correlate with subsequent network connection
level: informational

---
title: Oxide RAT — Security Software Discovery
id: 0768192b-4567-4789-1012-oxide001av001
status: experimental
description: >
  Detects process enumeration targeting security tool names used by the oxide
  implant to identify installed AV/EDR. The implant checks for these process names
  in platform/linux.rs: clamd, freshclam, elastic-agent, osqueryd, falcon-sensor, cbagentd.
  Source: implant/src/platform/linux.rs:45-50
author: diemoeve
date: 2026/04/10
references:
  - https://attack.mitre.org/techniques/T1518/001/
tags:
  - attack.discovery
  - attack.t1518.001
logsource:
  product: linux
  category: process_creation
detection:
  selection:
    CommandLine|contains|any:
      - 'falcon-sensor'
      - 'elastic-agent'
      - 'cbagentd'
      - 'clamd'
      - 'osqueryd'
  filter_legitimate:
    Image|contains|any:
      - 'systemctl'
      - 'service'
      - '/opt/falcon'
      - '/opt/elastic'
  condition: selection and not filter_legitimate
falsepositives:
  - System administrators querying service status; correlate with preceding implant execution
level: medium
