title: Oxide RAT — C2 Beaconing over Long-Lived TLS Connection
id: 1879203c-5678-4890-2123-oxide001c2001
status: experimental
description: >
  Detects long-lived outbound TLS connection from a non-browser process to a
  single IP on a non-standard port, consistent with oxide C2 beaconing.
  The implant maintains a persistent TLS 1.3 connection to the panel on port 4444
  (configurable via OXIDE_C2_PORT). Heartbeat interval: 30s (server-configured).
  Reconnection: exponential backoff 1s-60s with ±25% jitter.
author: diemoeve
date: 2026/04/10
references:
  - https://attack.mitre.org/techniques/T1071/001/
  - https://attack.mitre.org/techniques/T1573/001/
tags:
  - attack.command_and_control
  - attack.t1071.001
  - attack.t1573.001
logsource:
  product: linux
  category: network_connection
detection:
  selection:
    Initiated: 'true'
    DestinationPort|not:
      - 80
      - 443
      - 22
  filter_legitimate:
    Image|contains:
      - '/usr/bin/ssh'
      - '/usr/bin/curl'
      - '/usr/bin/wget'
      - 'apt'
      - 'dpkg'
      - 'git'
  condition: selection and not filter_legitimate
falsepositives:
  - Applications using non-standard ports; tune by known-good process list
level: low

