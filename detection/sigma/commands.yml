title: Oxide RAT — Screen Capture
id: 7435e6f7-1234-4456-8789-oxide001ss001
status: experimental
description: >
  Detects the oxide screenshot handler: spawns scrot and writes output to
  /tmp/.oxide_screenshot.png. Two indicators:
  1. scrot process with output path argument
  2. FileCreate event for /tmp/.oxide_screenshot.png
  Source: implant/src/commands/screenshot.rs:11
author: diemoeve
date: 2026/04/10
references:
  - https://attack.mitre.org/techniques/T1113/
tags:
  - attack.collection
  - attack.t1113
logsource:
  product: linux
  category: process_creation
detection:
  selection:
    Image|endswith: '/scrot'
    CommandLine|contains: '.oxide_screenshot.png'
  condition: selection
falsepositives:
  - None expected — highly specific temp file path
level: high

