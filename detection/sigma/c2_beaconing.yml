title: Oxide RAT — C2 on Default Port 4444 TLS
id: 2980314d-6789-4901-3234-oxide001c2002
status: experimental
description: >
  Detects outbound TLS connection to port 4444, the oxide C2 default port.
  Source: implant/src/config.rs — default port 4444, override via OXIDE_C2_PORT.
  This is a high-confidence indicator when port 4444 is not used by any
  legitimate service in the environment.
author: diemoeve
date: 2026/04/10
references:
  - https://attack.mitre.org/techniques/T1071/001/
tags:
  - attack.command_and_control
  - attack.t1071.001
logsource:
  product: linux
  category: network_connection
detection:
  selection:
    DestinationPort: 4444
    Initiated: 'true'
  condition: selection
falsepositives:
  - Metasploit default listener port; other tools using 4444
level: medium
