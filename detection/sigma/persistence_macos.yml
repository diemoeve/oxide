title: Oxide RAT — macOS LoginItem Persistence via osascript
id: 3091a2b3-7890-4012-4345-oxide001li001
status: experimental
description: >
  Detects osascript invocation adding the "oxide" LoginItem.
  Exact AppleScript from implant code:
    tell application "System Events" to make login item at end with properties
      {path:"<binary_path>", hidden:true, name:"oxide"}
  The name:"oxide" property is required on macOS 13+ (Ventura) to avoid
  BTM (Behind The Mac) errors. Removal uses: delete login item "oxide".
  NOTE: macOS 13+ shows a system notification when a LoginItem is registered.
author: diemoeve
date: 2026/04/10
references:
  - https://attack.mitre.org/techniques/T1547/015/
tags:
  - attack.persistence
  - attack.t1547.015
logsource:
  product: macos
  category: process_creation
detection:
  selection_process:
    process.name: 'osascript'
    CommandLine|contains|all:
      - 'login item'
      - 'name:"oxide"'
  condition: selection_process
falsepositives:
  - None expected — highly specific login item name
level: high
