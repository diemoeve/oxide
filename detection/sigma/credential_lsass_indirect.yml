title: LSASS Access via Indirect Syscall — Unknown Callstack
id: a9d5e3c2-4156-4f33-e045-oxide019lsa1
status: experimental
description: >
  Detects LSASS memory access where CallTrace contains UNKNOWN entries,
  indicating the caller bypassed ntdll hooks via direct or indirect syscall
  (dinvk, SysWhispers2, nanodump pattern). Classic signal for in-memory
  credential dumping tools that avoid MiniDumpWriteDump.
date: 2026/04/16
author: diemoeve
references:
  - https://github.com/fortra/nanodump
  - https://www.ultimatewindowssecurity.com/securitylog/encyclopedia/event.aspx?eventid=90010
tags:
  - attack.credential_access
  - attack.t1003.001
logsource:
  product: windows
  category: process_access
detection:
  selection:
    TargetImage|endswith: '\lsass.exe'
    CallTrace|contains: 'UNKNOWN'
  condition: selection
falsepositives:
  - Custom security tools with non-standard call stacks
level: critical
