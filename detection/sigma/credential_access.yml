title: GENERIC — Browser Credential Database Access by Non-Browser Process
id: 3091425e-7890-4012-4345-oxide001cr001
status: experimental
description: >
  GENERIC RULE — oxide-stealer (S6) not yet implemented.
  Detects access to Chromium/Firefox credential databases by a non-browser process.
  When oxide-stealer is built, it will access:
    Linux:   ~/.config/google-chrome/Default/Login Data
             ~/.config/chromium/Default/Login Data
             ~/.mozilla/firefox/*.default*/logins.json
             ~/.mozilla/firefox/*.default*/key4.db
  Use this rule as a baseline; refine with oxide-stealer binary name when available.
author: diemoeve
date: 2026/04/10
references:
  - https://attack.mitre.org/techniques/T1555/003/
tags:
  - attack.credential_access
  - attack.t1555.003
logsource:
  product: linux
  service: auditd
detection:
  selection:
    event.original|contains|any:
      - 'google-chrome/Default/Login Data'
      - 'chromium/Default/Login Data'
      - 'google-chrome/Default/Network/Cookies'
      - '.mozilla/firefox'
      - 'logins.json'
      - 'key4.db'
  filter_browsers:
    event.original|contains|any:
      - 'comm="chrome"'
      - 'comm="chromium"'
      - 'comm="firefox"'
      - 'comm="google-chrome"'
  condition: selection and not filter_browsers
falsepositives:
  - Backup tools (rsync, borg, restic); add comm value to filter
  - Profile sync tools
level: high
